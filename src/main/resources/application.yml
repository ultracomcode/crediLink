spring:
  application:
    name: CrediLink

  threads:
    virtual:
      enabled: true

  jackson:
    time-zone: UTC

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.http.client.HttpClientAutoConfiguration

  profiles:
    active: dev

logging:
  level:
    com.main: DEBUG
    org.springframework.ws: DEBUG
    com.main.service.WebhookPixService: INFO
    org.hibernate: INFO
